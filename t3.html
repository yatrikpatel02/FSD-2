<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        var a = {
            "div1": {
                "name": ["Ram", "Seeta", "Geeta"],
                "age": [19, 20, 21]
            },
            "div2": {
                "name": ["Shyam", "Sundar", "Hari"],
                "age": [22, 23, 21]
            }
        }
        var d1 = a.div1.name;
        var d2 = a.div2.name;
        var arr = d1.concat(d2).sort();
        console.log(arr);
        for (i of arr) {
            document.write(`<h2>Student ${i} </h2>`);
        }
        var a1 = a.div1.age;
        var a2 = a.div2.age;
        var arr2 = a1.concat(a2).sort((a, b) => b - a);
        console.log(arr2);
    </script>
</head>

<body>

</body>

</html>
