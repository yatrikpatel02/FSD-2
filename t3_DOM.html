<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <button onclick="fun()">
        click Here
    </button>
    <h2 id="a"></h2>
    <h2 id="b"></h2>
    <h2 id="c"></h2>
    <script>
        var obj = `{"Name":"Dhriti","age":10,"dob":"2010-02-24"}`;
        function fun() {
            let i = document.getElementById("a")
            let j = document.getElementById("b")
            let k = document.getElementById("c")
            var d = JSON.parse(obj)
            d.age = 5;
            d["Name"] = "Yatrik"
            i.innerHTML = "Name is " + d.Name
            j.innerHTML = "Age is " + d.age
            k.innerHTML = "DOB is " + d.dob
        }
    </script>
</body>

</html>
